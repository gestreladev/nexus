name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & test (nexus-api)
    runs-on: ubuntu-latest

    # Real backing services so integration tests run exactly as locally.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: nexus
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      kafka:
        image: confluentinc/cp-kafka:7.8.0
        ports:
          - 9092:9092
        env:
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build & test
        working-directory: nexus-api
        run: ./gradlew build --no-daemon --stacktrace
