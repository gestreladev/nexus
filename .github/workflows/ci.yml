name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & test (nexus-api)
    runs-on: ubuntu-latest

    # Real backing services so integration tests run exactly as locally.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: nexus
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build & test
        working-directory: nexus-api
        run: ./gradlew build --no-daemon --stacktrace
