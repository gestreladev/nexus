ktor:
  application:
    modules:
      - dev.nexus.api.ApplicationKt.module
  deployment:
    port: 8080

nexus:
  version: "0.9.0"
  environment: "development"
  db:
    url: "jdbc:postgresql://localhost:5433/nexus"
    user: "nexus"
    password: "nexus"
    maxPoolSize: 10
  jwt:
    # Dev default only — production overrides via the JWT_SECRET env var.
    secret: "dev-only-secret-change-me"
    issuer: "nexus-api"
    audience: "nexus-api"
    realm: "nexus"
    expiresInMinutes: 60
  redis:
    # Dev default; production overrides via the REDIS_URL env var.
    url: "redis://localhost:6379"
  kafka:
    # Dev default; production overrides via KAFKA_BOOTSTRAP_SERVERS.
    bootstrapServers: "localhost:9092"
    documentTopic: "document.uploaded"
