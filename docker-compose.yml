services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: nexus-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    mem_limit: 1g
    environment:
      # Single-node KRaft (no ZooKeeper): this node is both broker and controller.
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Dual listeners: EXTERNAL for host clients (localhost:9092),
      # INTERNAL for in-network containers (kafka:29092).
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  nexus-api:
    build: ./nexus-api
    container_name: nexus-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexus     # service-name host, not localhost
      DB_USER: nexus
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092              # INTERNAL listener
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}  # never a committed literal
    ports:
      - "8080:8080"
    mem_limit: 768m
    cpus: 1.5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s            # JVM boot + Flyway migrations excluded from failures

  nexus-ingest:
    build: ./nexus-ingest
    container_name: nexus-ingest
    restart: unless-stopped
    init: true                     # PID-1 reaper → uvicorn gets a clean SIGTERM to drain
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      NEXUS_ENVIRONMENT: docker
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_KAFKA_DOCUMENT_TOPIC: document.uploaded
    ports:
      - "8081:8081"
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  nexus-postgres-data:
  nexus-redis-data:
