services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: nexus-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    mem_limit: 1g
    environment:
      # Single-node KRaft (no ZooKeeper): this node is both broker and controller.
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Dual listeners: EXTERNAL for host clients (localhost:9092),
      # INTERNAL for in-network containers (kafka:29092).
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Observability backend (Phase 10): one image bundling the OTel Collector +
  # Tempo (traces) + Loki (logs) + Prometheus (metrics) + provisioned Grafana.
  lgtm:
    image: grafana/otel-lgtm:0.11.16
    container_name: nexus-lgtm
    restart: unless-stopped
    ports:
      - "3000:3000"   # Grafana UI (admin/admin)
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP
    volumes:
      - nexus-lgtm-data:/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]  # image has curl, not wget
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nexus-api:
    build: ./nexus-api
    container_name: nexus-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      lgtm: { condition: service_healthy }
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nexus     # service-name host, not localhost
      DB_USER: nexus
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092              # INTERNAL listener
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}  # never a committed literal
      DB_MIGRATIONS_LOCATION: filesystem:/app/db/migration  # fat-jar classpath scan mis-resolves names
      # OpenTelemetry (read by the Java agent). Traces-only for Session A.
      OTEL_SERVICE_NAME: nexus-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none      # flip to otlp in Session B
      OTEL_LOGS_EXPORTER: none
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=nexus,deployment.environment.name=docker,service.version=0.9.0
    ports:
      - "8080:8080"
    mem_limit: 768m
    cpus: 1.5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s            # JVM boot + Flyway migrations excluded from failures

  nexus-ingest:
    build: ./nexus-ingest
    container_name: nexus-ingest
    restart: unless-stopped
    init: true                     # PID-1 reaper → uvicorn gets a clean SIGTERM to drain
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      lgtm: { condition: service_healthy }
    environment:
      NEXUS_ENVIRONMENT: docker
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_KAFKA_DOCUMENT_TOPIC: document.uploaded
      NEXUS_DB_DSN: postgresql://nexus:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/nexus
      NEXUS_EMBEDDING_PROVIDER: local          # local model baked into the image
      # OpenTelemetry (read by the OTel SDK in app/telemetry.py).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    ports:
      - "8081:8081"
    mem_limit: 2g                  # torch + the 1024-dim mxbai model
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

volumes:
  nexus-postgres-data:
  nexus-redis-data:
  nexus-lgtm-data:
